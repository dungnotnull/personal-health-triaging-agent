# ── Chest Pain Question Tree ───────────────────────────────────────

chief_complaint: chest_pain
snomed_code: "29857009"
icd11_code: "MD30"

initial_questions:
  - id: CP_Q1
    question_vi: "Cơn đau ngực này bắt đầu như thế nào — đột ngột hay từ từ?"
    question_en: "Did this chest pain come on suddenly or gradually?"
    options: [sudden, gradual]

  - id: CP_Q2
    question_vi: "Bạn đánh giá mức độ đau từ 1 đến 10 như thế nào?"
    question_en: "On a scale of 1-10, how severe is the pain?"
    type: numeric_scale

  - id: CP_Q3
    question_vi: "Đau có lan đi đâu không? (lan xuống cánh tay, hàm, lưng...)"
    question_en: "Does the pain radiate anywhere? (down arm, jaw, back...)"
    type: free_text

  - id: CP_Q4
    question_vi: "Bạn có bị vã mồ hôi, buồn nôn, hoặc khó thở kèm theo không?"
    question_en: "Do you have sweating, nausea, or difficulty breathing with it?"
    type: free_text

  - id: CP_Q5
    question_vi: "Cơn đau có liên quan đến gắng sức hoặc căng thẳng không?"
    question_en: "Is the pain related to exertion or stress?"
    type: free_text

  - id: CP_Q6
    question_vi: "Bạn có tiền sử bệnh tim mạch, tiểu đường, hoặc cao huyết áp không?"
    question_en: "Do you have a history of heart disease, diabetes, or hypertension?"
    type: free_text

branching:
  CP_Q1_sudden:
    next_questions:
      - id: CP_Q7
        question_vi: "Đau có thay đổi khi bạn thở sâu hoặc thay đổi tư thế không?"
        question_en: "Does the pain change when you take a deep breath or change position?"
        type: free_text
