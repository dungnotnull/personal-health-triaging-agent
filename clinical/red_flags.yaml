# ── Wearable Thresholds ────────────────────────────────────────────
wearable_thresholds:
  heart_rate:
    bradycardia_emergency: 40
    tachycardia_emergency: 150
    tachycardia_urgent: 120
  spo2:
    emergency: 92
    urgent: 94
  temperature:
    hyperthermia_emergency: 40.0
    hyperthermia_urgent: 39.0
