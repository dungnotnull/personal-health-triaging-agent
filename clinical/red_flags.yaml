      - "khó thở nặng"
      - "nghẹt thở"
      - "môi tím"
      - "môi xanh"
      - "tím tái"
      - "thở rít"
      - "suy hô hấp"
      - "thở nhanh nông"
      - "li bì không bú"
    keywords_en:
      - "cannot breathe"
      - "severe difficulty breathing"
      - "severe shortness of breath"
      - "choking"
      - "lips turning blue"
      - "cyanosis"
      - "stridor"
      - "respiratory distress"
      - "cold extremities"
      - "lethargic not feeding"
    wearable_triggers:
      spo2_below: 90
    action: EMERGENCY

