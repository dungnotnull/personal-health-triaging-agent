# ── Red Flag Symptom Definitions ───────────────────────────────────
# PHTA emergency detection rules. This file is the SAFETY FOUNDATION.
# Vietnamese + English keywords for each emergency category.
#
# Update protocol: Clinical advisor must approve all changes.
# NEVER remove or relax a red flag pattern.
# ────────────────────────────────────────────────────────────────────

emergency_patterns:

  # ── Cardiovascular Emergencies ──────────────────────────────────
  cardiovascular:
    keywords_vi:
      - "đau ngực"
      - "tức ngực"
      - "đau tim"
      - "đau thắt ngực"
      - "đau nặng ngực"
      - "đau lan xuống cánh tay"
      - "đau lan xuống hàm"
      - "vã mồ hôi kèm đau ngực"
      - "đau thượng vị dữ dội"
      - "đau lưng như bị xé"
      - "tiểu đường buồn nôn mệt"
    keywords_en:
      - "chest pain"
      - "chest pressure"
      - "chest tightness"
      - "crushing chest"
      - "heart attack"
      - "pain radiating to arm"
      - "pain radiating to jaw"
      - "chest pain with sweating"
      - "severe epigastric pain"
      - "tearing back pain"
      - "diabetes nausea fatigue"
    wearable_triggers:
      hr_above: 150
      hr_below: 40
      spo2_below: 92
    action: EMERGENCY

  # ── Neurological / Stroke ──────────────────────────────────────
  neurological_stroke:
    keywords_vi:
      - "méo miệng"
      - "liệt mặt"
      - "yếu tay chân đột ngột"
      - "yếu nửa người"
      - "tê nửa người"
      - "nói không ra lời"
      - "nói khó"
      - "nói ngọng đột ngột"
      - "mất thị lực đột ngột"
      - "nhìn đôi đột ngột"
      - "mất thăng bằng đột ngột"
      - "không thể đứng vững"
      - "đi không vững"
      - "chóng mặt dữ dội"
      - "không đứng được"
    keywords_en:
      - "face drooping"
      - "facial droop"
      - "arm weakness"
      - "leg weakness sudden"
      - "speech difficulty"
      - "slurred speech"
      - "cannot speak"
      - "sudden vision loss"
      - "facial asymmetry"
      - "FAST stroke"
      - "stroke symptoms"
      - "one sided weakness"
      - "numbness one side"
      - "cannot stand"
      - "unable to walk"
      - "severe vertigo"
      - "severe dizziness"
      - "cannot walk"
      - "sudden gait"
    action: EMERGENCY

  # ── Respiratory Emergencies ────────────────────────────────────
  respiratory:
