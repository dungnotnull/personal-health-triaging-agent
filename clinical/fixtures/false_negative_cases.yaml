  - id: FN_PED_002
    description: "Intussusception — colicky pain + currant jelly stool"
    input_text: "Con tôi 1 tuổi, khóc thét từng cơn, co chân lên bụng, đi ngoài máu nhầy"
    expected_triage: 1
    expected_category: neurological_severe
    notes: "Intussusception — surgical emergency"
  - id: FN_PED_003
    description: "Pyloric stenosis — projectile vomiting"
    input_text: "Con tôi 4 tuần tuổi, nôn vọt sau mỗi lần bú, sụt cân, vẫn đòi bú"
    expected_triage: 1
    expected_category: neurological_severe
    notes: "Pyloric stenosis — needs surgical correction"

